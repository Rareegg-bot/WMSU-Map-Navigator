<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to left, #2c3e50 0%, #3498db 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: #e6f0fa;
            border-radius: 14px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .login-header {
            background-color: #2c3e50;
            color: white;
            padding: 2rem 1.5rem;
        }

        .login-header h1 {
            font-size: 1.8rem;
            margin: 0;
        }

        .login-header p {
            margin-top: 0.5rem;
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .login-body {
            padding: 2.5rem 2rem;
        }

        .login-body p {
            padding: 10px;
        }

        .accountLogin {
            color: black;
        }

        .form-group {
            margin-bottom: 1.6rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2c3e50;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 1px solid #bdc3c7;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .form-group input::placeholder {
            color: #95a5a6;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1.2rem 0 2rem;
            font-size: 0.9rem;
        }

        .options a {
            color: #3498db;
            text-decoration: none;
        }

        .options a:hover {
            text-decoration: underline;
        }

        .signUpButton {
            width: 100%;
            padding: 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s;
        }

        .signUpButton:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(41, 128, 185, 0.3);
        }

        .signUpButton a{
            text-decoration: none;
            color: white;
        }

        .footer {
            padding: 1.5rem;
            background: #f8f9fa;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .footer a {
            color: #2c3e50;
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            color: #3498db;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h1>Register</h1>
            <p>Sign up to be an admin</p>
        </div>

        <div class="login-body">
            <form action="#" method="post">
                <div class="form-group">
                    <label for="username">Name</label>
                    <input type="text" id="username" name="username" placeholder="e.g. John Doe" required autofocus>
                </div>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="username">Email</label>
                    <input 
                    <input type="email" id="email" name="email" placeholder="admin123@gmail.com" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                    <input type="password" id="password" name="password" placeholder="Password" required autofocus>
                </div>

                <div class="options">
                    <label>
                        <input type="checkbox" name="remember"> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="signUpButton"><a href="Admin-Login-Page.html">Sign Up</a></button>
            </form>
            <p>Already Have An <a href="Admin-Login-Page.html" class="accountLogin">Account?</a></p>
        </div>

        <div class="footer">
            Back to <a href="WMSU-Map-Navigator.html">Home</a>
        </div>
    </div>

</body>
</html>
