<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #3498db;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 10px;
        }

        .container{
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 14px;
            background-color: #e6f0fa;
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 240px 1fr;
            grid-template-rows: auto 1fr;
            grid-template-areas: 
                "header  header"
                "sidebar main";
        }

        header {
            grid-area: header;
            background-color: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.6rem;
        }

        aside {
            grid-area: sidebar;
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 1.5rem;
            position: sticky;
            top: 0;
            height: auto;
            overflow-y: auto;
        }

        aside h2 {
            color: #bdc3c7;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav ul {
            list-style: none;
        }

        nav ul li {
            margin: 0.4rem 0;
        }

        nav ul li a {
            display: block;
            padding: 0.75rem 1rem;
            color: #ecf0f1;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.2s;
        }

        nav ul li a:hover{
            background-color: #34495e;
            color: white;
        }

        main {
            grid-area: main;
            background: white;
            padding: 2rem;
        }

        .dashboard{
            background-color: #bdc3c7;
            padding: 30px;
            border: none;
            border-radius: 14px;
            margin-bottom: 50px;
        }

        .column{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            grid-template-areas: "column1" "column2" "column3";  
            justify-content: space-between;
            gap: 20px;
        }

        .column1, .column2, .column3{
            border: none;
            border-radius: 14px;
            height: 50vh;
            padding: 20px;
            background-color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .column1:hover{
            transform: translateY(-10px);
        }

        .column2:hover{
            transform: translateY(-10px);
        }

        .column3:hover{
            transform: translateY(-10px);
        }

        .column p{
            margin-bottom: 30px;
        }

        .column span{
            padding: 5px 20px;
            background-color: aquamarine;
            color: green;
            border: none;
            border-radius: 24px;
        }

        hr{
            margin: 10px 0px 10px 0px;
            width: 1fr;
        }

        </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Admin Panel</h1>
            <div>Admin</div>
        </header>

        <aside>
            <h2>Navigation</h2>
            <nav>
                <ul>
                    <li><a href="#">Dashboard</a></li>
                    <li><a href="#">Settings</a></li>
                    <li><a href="WMSU-Map-Navigator.html">Back to Home</a></li>
                    <li><a href="Admin-Login-Page.html">Log Out</a></li>
                </ul>
            </nav>
        </aside>

        <main>
            <div class="dashboard">
                <h1>Welcome to the Dashboard</h1>
                <p>This is the main admin area.</p>
            </div>    
            <div class="column">
                <div class="column1">
                    <h2>Viewers</h2>
                    <hr>
                    <p>Last 10 Days</p>
                    <span>+20%</span>
                </div>
                <div class="column2">
                    <h2>History</h2>
                    <hr>
                    <p>Last 10 Days</p>
                    <span>+20%</span>
                </div>
                <div class="column3">
                    <h2>Analytics</h2>
                    <hr>
                    <p>Last 10 Days</p>
                    <span>+20%</span>
                </div>
            </div>    
        </main>
    </div>     
</body>
</html>
